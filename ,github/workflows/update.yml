name: Обновление списка файлов
on:
  schedule:
    - cron: "*/30 * * * *" # Каждые 30 минут
  workflow_dispatch: # Ручной запуск

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Получить список файлов через API
        run: |
          curl -H "Accept: application/vnd.github.v3+json" \
               https://api.github.com/repos/igareck/vpn-configs-for-russia/contents/ \
               > files.json
      - name: Коммитить обновление
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files.json
          git commit -m "Автообновление списка файлов" || exit 0
          git push
